name: CMake CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:

      - name: Клонирование репозитория
        uses: actions/checkout@v4

      - name: Конфигурация CMake
        run: |
          rm -rf build
          cmake -S . -B build

      - name: Сборка проекта
        run: cmake --build build

      - name: Запуск тестов
        run: ctest --test-dir build --output-on-failure
